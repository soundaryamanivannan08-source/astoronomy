<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astronomy - Login page</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
</head>

<style>

        :root {
            --color-deep-space: #000000;
            --color-midnight-blue: #15132A;
            --color-nebula-purple: #6A11CB;
            --color-cosmic-violet: #00E5FF;
            --color-bright-purple: #2575FC;
            --color-starlight-white: #FFFFFF;
        }

    * {
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        font-family: "Noto Sans", sans-serif;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(124deg, color-mix(in srgb, var(--color-deep-space) 61.6%, transparent), color-mix(in srgb, var(--color-deep-space) 63.7%, transparent)), url('./src/logo-bg.webp');
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        padding: 50px 10px;
        overflow-x: hidden;
    }

    .login-page {
        border: 1px solid var(--color-cosmic-violet);
        color: var(--color-starlight-white);
        background: color-mix(in srgb, var(--color-deep-space) 66.4%, transparent);
        padding: 20px;
        width: 100%;
        max-width: 350px;
        border-radius: 30px;
    }

    .login-top {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .login-top img {
        width: 190px;
    }

    .login-top h1 {
        font-size: 30px;
        margin-bottom: 10px;
    }

    .login-top p {
        font-size: 13px;
    }

    .form {
        width: 100%;
        margin-block: 30px;
    }

    .input-box {
        display: flex;
        flex-direction: column;
        gap: 5px;
    }

    .input-box label {
        font-size: 13px;
        color: var(--color-cosmic-violet);
    }

    .input-field {
        position: relative;
        margin-bottom: 10px;
    }


    .input-field input {
        width: 100%;
        appearance: none;
        padding: 14px 10px;
        border-radius: 5px;
        border: none;
        outline: none;
        background: var(--color-deep-space);
        color: var(--color-starlight-white);
    }

    .input-field input:focus {
        border: 1px solid var(--color-cosmic-violet);
    }


    .input-field input::placeholder {
            color:  color-mix(in srgb, var(--color-starlight-white) 51.4%, transparent);
    /*color: color-mix(in srgb, var(--color-cosmic-violet) 39.7%, transparent);*/
    }


    .formicons {
        position: absolute;
        font-size: 15px;
        color: var(--color-cosmic-violet);
        right: 23px;
        top: 50%;
        transform: translateY(-50%);
    }

    .login-btn {
        width: 100%;
        background: var(--color-cosmic-violet);
        border: none;
        padding: 11px 10px;
        border-radius: 5px;
        outline: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        font-weight: bold;
        margin-top: 10px;
        font-size: 15px;
    }

    .login-btn span {
        font-size: 15px;
        color: var(--color-deep-space);
        font-weight: bold;
    }

    .login-footer {
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .login-footer p,
    .login-footer a {
        font-size: 13px;
        text-decoration: none;
        color: var(--color-starlight-white);
    }

    .login-footer a:hover {
        color: var(--color-cosmic-violet);
    }

    .login-footer a:first-child {
        color: var(--color-cosmic-violet);
    }

    .login-socials {
        display: flex;
        gap: 10px;
        color: var(--color-deep-space);
        align-items: center;
        justify-content: center;
        margin-block: 10px;
    }

    .social-icon {
        height: 30px;
        width: 30px;
        background: var(--color-cosmic-violet);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
    }

    .custom-dropdown{
    position:relative;
    width:100%;
}

.dropdown-btn{
    height:46px;
    border-radius:5px;
    background:#050505;
    color:var(--color-starlight-white);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    cursor:pointer;
    transition:.3s;
    margin-bottom: 10px;
}

.dropdown-btn:hover{
    border: 1px solid var(--color-cosmic-violet);
}




.left{
    display:flex;
    align-items:center;
   
}

.left .material-symbols-outlined{
    color:var(--color-cosmic-violet);
}

.arrow{
    color:var(--color-cosmic-violet);
    transition:.3s;
}

.custom-dropdown.active .arrow{
    transform:rotate(180deg);
}

.dropdown-list{
    position:absolute;
    top:58px;
    left:0;
    width:100%;
    background:var(--color-deep-space);
    border:1px solid #ff9900a1;
    border-radius:10px;
    overflow:hidden;
    display:none;
    z-index:999;
}

.custom-dropdown.active .dropdown-list{
    display:block;
}

.dropdown-list li{
    list-style:none;
    padding:16px 20px;
    color:#ffb300;
    cursor:pointer;
    transition:.3s;
}

.dropdown-list li:hover{
    background:rgba(255,152,0,.1);
}

.selected-text{
    font-size: 13px;
    color: var(--color-starlight-white);
    /*color: color-mix(in srgb, var(--color-cosmic-violet) 39.7%, transparent);*/

}
</style>

<body>
    <section class="login-page">

        <div class="login-top">
            <div class="logo">
                <img src="./src/logo (4) (1).webp" alt="Company Logo">
            </div>

            <h1>Welcome Back</h1>

            <p>Login To Your Account</p>
        </div>

        <form class="form" id="loginForm">

            <div class="input-box">

                <label for="role">Select Role</label>

                <div class="custom-dropdown">

                    <div class="dropdown-btn">
                        <span class="left">
                           
                            <span class="selected-text">Choose Role</span>
                        </span>

                        <span class="material-symbols-outlined arrow">
                            keyboard_arrow_down
                        </span>
                    </div>

                    <ul class="dropdown-list">
                        <li data-value="Admin">Admin</li>
                        <li data-value="Client">Client</li>
                    </ul>

                    <input type="hidden" name="role" id="role">

                </div>

            </div>

            <div class="input-box">

                <label for="email">Email</label>

                <div class="input-field">
                    <input type="email" name="email" id="email" placeholder="Enter Your Email">
                    <span class="material-symbols-outlined formicons">mail</span>
                </div>

            </div>


            <div class="input-box">

                <label for="password">Password</label>

                <div class="input-field">
                    <input type="password" name="password" id="password" placeholder="Enter Your Password">
                    <span class="material-symbols-outlined formicons passicon">visibility_off</span>
                </div>

            </div>

            <button class="login-btn" type="submit"><span class="material-symbols-outlined">login </span>Login </button>

        </form>

        <div class="login-footer">

            <p>or Sign Up Using</p>

            <div class="login-socials">
                <div class="social-icon errorpage"><i class="fa-brands fa-linkedin-in"></i></div>
                <div class="social-icon errorpage"><i class="fa-brands fa-x-twitter"></i></div>
                <div class="social-icon errorpage"><i class="fa-brands fa-facebook-f"></i></div>
                <div class="social-icon errorpage"><i class="fa-brands fa-youtube"></i></div>
            </div>

            <p>Don't have an account? <a href="sign.html">Sign Up</a></p>

            <a href="404.html">Forgot Password</a>

        </div>

    </section>

    <script>

        //drop  

        //validation

        const loginForm = document.getElementById("loginForm");

        const role = document.getElementById("role");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        loginForm.addEventListener("submit", function (e) {

            e.preventDefault();

            const selectedRole = role.value.trim();
            const emailValue = email.value.trim();
            const passwordValue = password.value.trim();

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (selectedRole === "") {
                alert("Please select a role");
                role.focus();
                return;
            }

            if (emailValue === "") {
                alert("Please enter your email address");
                email.focus();
                return;
            }

            if (!emailRegex.test(emailValue)) {
                alert("Please enter a valid email address");
                email.focus();
                return;
            }

            if (passwordValue === "") {
                alert("Please enter your password");
                password.focus();
                return;
            }

            if (passwordValue.length < 6) {
                alert("Password must be at least 6 characters");
                password.focus();
                return;
            }

            /* Redirect Based On Role */

            // Save Email
            localStorage.setItem("userEmail", emailValue);

            // Save Role
            localStorage.setItem("userRole", selectedRole);

            if (selectedRole === "Admin") {
                window.location.href = "admin.html";
            }
            else if (selectedRole === "Client") {
                window.location.href = "client.html";
            }

        });
        //pass iocn

        const passIcon = document.querySelector(".passicon");
        const passwordInput = document.getElementById("password");

        passIcon.addEventListener("click", () => {

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                passIcon.textContent = "visibility";
            } else {
                passwordInput.type = "password";
                passIcon.textContent = "visibility_off";
            }

        });


        //drop down

        const dropdown = document.querySelector(".custom-dropdown");
const btn = document.querySelector(".dropdown-btn");
const options = document.querySelectorAll(".dropdown-list li");
const selectedText = document.querySelector(".selected-text");
const hiddenInput = document.querySelector("#role");

btn.addEventListener("click", () => {
    dropdown.classList.toggle("active");
});

options.forEach(option => {

    option.addEventListener("click", () => {

        selectedText.textContent = option.textContent;
        hiddenInput.value = option.dataset.value;

        dropdown.classList.remove("active");

    });

});

document.addEventListener("click", (e) => {

    if (!dropdown.contains(e.target)) {
        dropdown.classList.remove("active");
    }

});

//error page


        document.querySelectorAll(".errorpage").forEach(element => {

    element.style.cursor = "pointer";

    element.addEventListener("click", () => {
        window.location.href = "404.html";
    });

});


    </script>
</body>

</html>
